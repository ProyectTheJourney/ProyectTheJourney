<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0F172A"/>

  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#10B981" stroke-width="4" stroke-opacity="0.3"/>

  <!-- Stars decorative -->
  <circle cx="80"  cy="80"  r="3" fill="#ffffff" opacity="0.5"/>
  <circle cx="430" cy="90"  r="2" fill="#ffffff" opacity="0.4"/>
  <circle cx="60"  cy="380" r="2" fill="#ffffff" opacity="0.4"/>
  <circle cx="450" cy="400" r="3" fill="#ffffff" opacity="0.5"/>
  <circle cx="160" cy="440" r="2" fill="#ffffff" opacity="0.3"/>
  <circle cx="370" cy="440" r="2" fill="#ffffff" opacity="0.3"/>

  <!-- Robot body aura -->
  <ellipse cx="256" cy="290" rx="140" ry="165" fill="#10B981" fill-opacity="0.08"/>

  <!-- Robot legs -->
  <rect x="210" y="360" width="38" height="80" rx="19" fill="#0F172A"/>
  <rect x="264" y="360" width="38" height="80" rx="19" fill="#0F172A"/>
  <rect x="210" y="360" width="38" height="80" rx="19" fill="none" stroke="#10B981" stroke-width="2" stroke-opacity="0.5"/>
  <rect x="264" y="360" width="38" height="80" rx="19" fill="none" stroke="#10B981" stroke-width="2" stroke-opacity="0.5"/>
  <!-- Boots -->
  <rect x="204" y="418" width="50" height="22" rx="8" fill="#1E293B" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.5"/>
  <rect x="258" y="418" width="50" height="22" rx="8" fill="#1E293B" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Robot torso -->
  <rect x="178" y="248" width="156" height="122" rx="28" fill="#0F172A"/>
  <rect x="178" y="248" width="156" height="122" rx="28" fill="#10B981" fill-opacity="0.06"/>
  <rect x="178" y="248" width="156" height="122" rx="28" fill="none" stroke="#10B981" stroke-width="2.5" stroke-opacity="0.4"/>

  <!-- Chest panel detail -->
  <rect x="202" y="268" width="108" height="64" rx="14" fill="#10B981" fill-opacity="0.08" stroke="#10B981" stroke-width="1" stroke-opacity="0.35"/>
  <!-- Chest symbol -->
  <text x="256" y="310" text-anchor="middle" font-size="36" fill="#10B981" font-family="Arial" opacity="0.7">◈</text>

  <!-- Robot shoulder joints -->
  <ellipse cx="178" cy="276" rx="28" ry="24" fill="#0F172A"/>
  <ellipse cx="334" cy="276" rx="28" ry="24" fill="#0F172A"/>
  <ellipse cx="178" cy="276" rx="28" ry="24" fill="none" stroke="#10B981" stroke-width="2" stroke-opacity="0.35"/>
  <ellipse cx="334" cy="276" rx="28" ry="24" fill="none" stroke="#10B981" stroke-width="2" stroke-opacity="0.35"/>

  <!-- Robot arms -->
  <rect x="142" y="266" width="36" height="100" rx="18" fill="#0F172A"/>
  <rect x="334" y="266" width="36" height="100" rx="18" fill="#0F172A"/>
  <rect x="142" y="266" width="36" height="100" rx="18" fill="none" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.35"/>
  <rect x="334" y="266" width="36" height="100" rx="18" fill="none" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.35"/>

  <!-- Arm detail -->
  <rect x="138" y="340" width="44" height="26" rx="10" fill="#1E293B" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.5"/>
  <rect x="330" y="340" width="44" height="26" rx="10" fill="#1E293B" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Neck -->
  <rect x="232" y="224" width="48" height="32" rx="10" fill="#0F172A"/>

  <!-- Robot head -->
  <ellipse cx="256" cy="186" rx="78" ry="82" fill="#0F172A"/>
  <ellipse cx="256" cy="186" rx="78" ry="82" fill="#10B981" fill-opacity="0.07"/>
  <ellipse cx="256" cy="186" rx="78" ry="82" fill="none" stroke="#10B981" stroke-width="2.5" stroke-opacity="0.4"/>

  <!-- Eyes glow background -->
  <ellipse cx="222" cy="180" rx="20" ry="20" fill="#10B981" fill-opacity="0.15"/>
  <ellipse cx="290" cy="180" rx="20" ry="20" fill="#10B981" fill-opacity="0.15"/>

  <!-- Eyes -->
  <ellipse cx="222" cy="180" rx="13" ry="16" fill="#10B981"/>
  <ellipse cx="290" cy="180" rx="13" ry="16" fill="#10B981"/>

  <!-- Eye shine -->
  <ellipse cx="218" cy="175" rx="4" ry="4" fill="white" opacity="0.8"/>
  <ellipse cx="286" cy="175" rx="4" ry="4" fill="white" opacity="0.8"/>

  <!-- Nose dot -->
  <circle cx="256" cy="197" r="4" fill="#10B981" opacity="0.4"/>

  <!-- Smile -->
  <path d="M 232 210 Q 256 224 280 210" stroke="#10B981" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Eyebrow lines -->
  <path d="M 209 162 Q 222 157 235 162" stroke="#10B981" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M 277 162 Q 290 157 303 162" stroke="#10B981" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- Antenna -->
  <rect x="249" y="100" width="14" height="40" rx="7" fill="#0F172A"/>
  <circle cx="256" cy="94" r="14" fill="#10B981" fill-opacity="0.3" stroke="#10B981" stroke-width="2"/>
  <circle cx="256" cy="94" r="7" fill="#10B981"/>

  <!-- Ground glow -->
  <ellipse cx="256" cy="500" rx="140" ry="28" fill="#10B981" fill-opacity="0.12"/>
</svg>
